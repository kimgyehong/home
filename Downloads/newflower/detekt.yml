# Detekt 설정 파일 - 꽃 다이어리 KMP 프로젝트 
# 극도로 엄격한 품질 규칙으로 완벽한 코드 품질 보장
# 모든 코드는 100줄 이하, 사이클로매틱 복잡도 10 이하, 메서드 30줄 이하

build:
  maxIssues: 0
  excludeCorrectable: false

config:
  validation: true
  warningsAsErrors: true

complexity:
  active: true
  CyclomaticComplexMethod:
    active: true
    threshold: 10
    ignoreSingleWhenExpression: false
    ignoreSimpleWhenEntries: false
    ignoreNestingFunctions: false
  LargeClass:
    active: true
    threshold: 100
  LongMethod:
    active: true
    threshold: 30
    ignoreAnnotated: []
  LongParameterList:
    active: true
    functionThreshold: 5
    constructorThreshold: 6
    ignoreDefaultParameters: false
    ignoreDataClasses: false
  TooManyFunctions:
    active: true
    thresholdInFiles: 10
    thresholdInClasses: 10
    thresholdInInterfaces: 10
    thresholdInObjects: 10
    thresholdInEnums: 10
  ComplexCondition:
    active: true
    threshold: 3
  NestedBlockDepth:
    active: true
    threshold: 3

exceptions:
  active: true
  TooGenericExceptionCaught:
    active: true
    exceptionNames:
      - 'Exception'
      - 'Throwable'
      - 'RuntimeException'
  TooGenericExceptionThrown:
    active: true
    exceptionNames:
      - 'Error'
      - 'Exception'
      - 'Throwable'
      - 'RuntimeException'

naming:
  active: true
  ClassNaming:
    active: true
    classPattern: '[A-Z][a-zA-Z0-9]*'
  FunctionNaming:
    active: true
    functionPattern: '([a-z][a-zA-Z0-9]*)|(`.*`)'
  PackageNaming:
    active: true
    packagePattern: '[a-z]+(\.[a-z][A-Za-z0-9]*)*'
  VariableNaming:
    active: true
    variablePattern: '[a-z][A-Za-z0-9]*'

style:
  active: true
  MagicNumber:
    active: true
    ignoreNumbers:
      - '-1'
      - '0'
      - '1'
    ignoreHashCodeFunction: false
    ignorePropertyDeclaration: false
    ignoreLocalVariableDeclaration: false
    ignoreConstantDeclaration: true
    ignoreCompanionObjectPropertyDeclaration: true
    ignoreAnnotation: false
    ignoreNamedArgument: false
    ignoreEnums: false
    ignoreRanges: false
    ignoreExtensionFunctions: false
  MaxLineLength:
    active: true
    maxLineLength: 100
    excludePackageStatements: true
    excludeImportStatements: true
    excludeRawStrings: true
  ReturnCount:
    active: true
    max: 2
    excludedFunctions: 
      - 'equals'
    excludeLabeled: false
    excludeReturnFromLambda: true
  UnusedImports:
    active: true
  WildcardImport:
    active: true
  TrailingWhitespace:
    active: true
  NoTabs:
    active: true
  NewLineAtEndOfFile:
    active: true

formatting:
  active: true
  Indentation:
    active: true
    autoCorrect: true
    indentSize: 4