name: Platform Purity Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  check-platform-purity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check for Android imports in pure modules
        run: |
          echo "Checking for Android imports in pure Kotlin modules..."
          if grep -R "import android\." core/ feature/ app/shared | grep -v "expect"; then
            echo "::error::Android import found in pure Kotlin modules!"
            exit 1
          fi
          echo "✅ No Android imports found"
      
      - name: Check for iOS imports in pure modules
        run: |
          echo "Checking for iOS imports in pure Kotlin modules..."
          if grep -R "import UIKit\|import Foundation\|import platform\.ios" core/ feature/ app/shared | grep -v "expect"; then
            echo "::error::iOS import found in pure Kotlin modules!"
            exit 1
          fi
          echo "✅ No iOS imports found"
      
      - name: Check for Android plugin in pure modules
        run: |
          echo "Checking for Android plugin in pure Kotlin modules..."
          if grep -r "com\.android\.\|kotlin(\"android\")" core/ feature/ app/shared --include="*.gradle.kts" --include="*.gradle"; then
            echo "::error::Android plugin found in pure Kotlin modules!"
            exit 1
          fi
          echo "✅ No Android plugins found"
      
      - name: Verify multiplatform plugin usage
        run: |
          echo "Verifying kotlin multiplatform plugin usage..."
          for dir in core/common core/domain core/data feature/diary app/shared; do
            if [ -f "$dir/build.gradle.kts" ]; then
              if ! grep -q "kotlin(\"multiplatform\")" "$dir/build.gradle.kts"; then
                echo "::warning::$dir should use kotlin(\"multiplatform\") plugin"
              fi
            fi
          done
          echo "✅ Plugin check complete"